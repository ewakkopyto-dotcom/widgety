<!-- ŚLEDZENIE PACZEK — fragment do wklejenia -->

<style>
  @import url('https://cdn.jsdelivr.net/npm/@fontsource/manrope@5.0.20/index.css');
  @import url('https://cdn.jsdelivr.net/npm/@fontsource/nunito@5.0.21/index.css');
  @import url('https://cdn.jsdelivr.net/npm/@fontsource/barlow@5.0.13/index.css');

  .tracking-widget * { box-sizing: border-box; }
  .tracking-widget {
    max-width: 560px;
    margin: 0 auto;
    padding: 2rem 1rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #1a1a1a;
  }
  .tw-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .tw-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: #f3f3ef;
    display: flex; align-items: center; justify-content: center;
    color: #666;
  }
  .tw-title { margin: 0; font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
  .tw-sub { margin: 2px 0 0; font-size: 12.5px; color: #999; }

  .tw-input-wrap { position: relative; margin-bottom: 1.5rem; }
  .tw-search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: #999; pointer-events: none;
  }
  .tw-input {
    width: 100%;
    padding: 0 90px 0 40px;
    height: 44px;
    font-size: 14px;
    background: transparent;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    outline: none;
    color: #1a1a1a;
    font-family: inherit;
  }
  .tw-input:focus { border-color: rgba(0,0,0,0.3); }
  .tw-input::placeholder { color: #999; }
  .tw-submit {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    height: 32px; padding: 0 12px;
    font-size: 12px; font-weight: 500;
    background: #1a1a1a; color: #fff;
    border: none; border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }
  .tw-submit:hover { background: #000; }

  .tw-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .tw-tile {
    height: 46px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s ease;
    font-family: inherit;
  }
  .tw-tile:hover { transform: translateY(-1px); }
  .tw-tile:active { transform: translateY(0); }

  .tw-tile.inpost  { background: #FFCB04; }
  .tw-tile.dhl     { background: #FECC00; gap: 5px; }
  .tw-tile.dpd     { background: #DC0032; }
  .tw-tile.orlen   { background: #E3000F; }
  .tw-tile.allegro { background: #FF5A00; }

  .tw-wm-inpost  { font-family: 'Nunito', system-ui, sans-serif; font-size: 14px; font-weight: 800; color: #1A1A1A; letter-spacing: -0.025em; }
  .tw-wm-dhl     { font-family: 'Barlow', 'Helvetica Neue', sans-serif; font-size: 15px; font-weight: 800; font-style: italic; color: #D40511; letter-spacing: 0.01em; }
  .tw-wm-dpd     { font-family: 'Nunito', system-ui, sans-serif; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.04em; }
  .tw-wm-orlen   { font-family: 'Barlow', 'Helvetica Neue', sans-serif; font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.12em; }
  .tw-wm-allegro { font-family: 'Nunito', system-ui, sans-serif; font-size: 13px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }

  .tw-dhl-lines { display: flex; flex-direction: column; gap: 1.5px; }
  .tw-dhl-lines span { display: block; width: 8px; height: 1.5px; background: #D40511; }

  @media (max-width: 480px) {
    .tw-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .tw-tile { height: 42px; border-radius: 8px; }
    .tw-wm-inpost, .tw-wm-allegro, .tw-wm-orlen { font-size: 11px; }
    .tw-wm-dhl, .tw-wm-dpd { font-size: 13px; }
  }
</style>

<div class="tracking-widget">
  <div class="tw-header">
    <div class="tw-icon" aria-hidden="true">
      <!-- icon: package -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5"/><path d="M12 12v9"/><path d="M12 12L4 7.5"/><path d="M16 5.25l-8 4.5"/></svg>
    </div>
    <div>
      <h2 class="tw-title">Śledzenie paczek</h2>
      <p class="tw-sub">Wklej numer i wybierz kuriera</p>
    </div>
  </div>

  <div class="tw-input-wrap">
    <span class="tw-search-icon" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </span>
    <input id="tracking-input" type="text" class="tw-input" placeholder="Numer przesyłki" autocomplete="off" />
    <button class="tw-submit" onclick="trackPackage('inpost')">
      Śledź
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
    </button>
  </div>

  <div class="tw-grid">
    <button class="tw-tile inpost" onclick="trackPackage('inpost')" aria-label="Śledź InPost">
      <span class="tw-wm-inpost">InPost</span>
    </button>

    <button class="tw-tile dhl" onclick="trackPackage('dhl')" aria-label="Śledź DHL">
      <span class="tw-dhl-lines" aria-hidden="true"><span></span><span></span><span></span></span>
      <span class="tw-wm-dhl">DHL</span>
      <span class="tw-dhl-lines" aria-hidden="true"><span></span><span></span><span></span></span>
    </button>

    <button class="tw-tile dpd" onclick="trackPackage('dpd')" aria-label="Śledź DPD">
      <span class="tw-wm-dpd">dpd</span>
    </button>

    <button class="tw-tile orlen" onclick="trackPackage('orlen')" aria-label="Śledź Orlen Paczka">
      <span class="tw-wm-orlen">ORLEN</span>
    </button>

    <button class="tw-tile allegro" onclick="trackPackage('allegro')" aria-label="Śledź Allegro">
      <span class="tw-wm-allegro">allegro</span>
    </button>
  </div>
</div>

<script>
  function trackPackage(courier) {
    var input = document.getElementById('tracking-input');
    var num = input ? input.value.trim() : '';
    var n = encodeURIComponent(num);
    var urls = {
      inpost:  num ? 'https://inpost.pl/sledzenie-przesylek?number=' + n : 'https://inpost.pl/sledzenie-przesylek',
      dhl:     num ? 'https://www.dhl.com/pl-pl/home/tracking.html?tracking-id=' + n + '&submit=1' : 'https://www.dhl.com/pl-pl/home/tracking.html',
      dpd:     num ? 'https://tracktrace.dpd.com.pl/findPackage?p1=' + n : 'https://tracktrace.dpd.com.pl/',
      orlen:   num ? 'https://nadaj.orlenpaczka.pl/parcel/find?number=' + n : 'https://nadaj.orlenpaczka.pl/',
      allegro: num ? 'https://allegro.pl/moje-allegro/zakupy/sledzenie/?id=' + n : 'https://allegro.pl/moje-allegro/zakupy'
    };
    window.open(urls[courier], '_blank', 'noopener');
  }
  document.getElementById('tracking-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') trackPackage('inpost');
  });
</script>
