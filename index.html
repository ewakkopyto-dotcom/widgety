<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Śledzenie paczek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 8px;
  }

  .widget {
    width: 360px;
    height: 400px;
    max-width: 100%;
    max-height: 100%;
    background: transparent;
    border: 0.5px solid rgba(0, 0, 0, 0.07);
    border-radius: 20px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(0, 0, 0, 0.04);
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 96px;
  }
  .title {
    font-size: 22px;
    font-weight: 500;
    color: #4A4D55;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .illustration {
    flex-shrink: 0;
    margin-right: -8px;
    margin-top: -6px;
  }

  .field {
    display: flex;
    align-items: center;
    background: #FAFAF8;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    border-radius: 10px;
    padding: 0 14px;
    gap: 10px;
    transition: all 0.15s;
    margin-top: 6px;
  }
  .field:focus-within {
    border-color: #C4A56C;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px rgba(196, 165, 108, 0.12);
  }
  .input {
    border: none;
    background: transparent;
    outline: none;
    flex: 1;
    padding: 13px 0;
    font-size: 14px;
    font-family: inherit;
    color: #4A4D55;
    width: 100%;
  }
  .input::placeholder { color: #A0A4AC; }

  .label {
    font-size: 11px;
    color: #7A7E88;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 18px 0 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .courier {
    background: #FAFAF8;
    border: 0.5px solid rgba(0, 0, 0, 0.06);
    border-radius: 9px;
    padding: 12px 4px 10px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    font-family: inherit;
    user-select: none;
  }
  .courier:hover {
    background: #F0F0EE;
    transform: translateY(-1px);
  }
  .courier.active {
    background: #FFFFFF;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
  }
  .courier-name {
    font-size: 11px;
    color: #4A4D55;
    font-weight: 500;
  }

  .link-area {
    margin-top: auto;
    padding-top: 12px;
    min-height: 56px;
  }
  .link-card {
    display: none;
    align-items: center;
    gap: 10px;
    background: #FAFAF8;
    border: 0.5px solid rgba(0, 0, 0, 0.08);
    border-radius: 10px;
    padding: 10px 14px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: all 0.18s;
  }
  .link-card.show { display: flex; }
  .link-card:hover {
    background: #FFFFFF;
    border-color: rgba(0, 0, 0, 0.14);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }
  .link-icon { flex-shrink: 0; color: #4A4D55; }
  .link-content { flex: 1; min-width: 0; }
  .link-title {
    font-size: 12px;
    color: #4A4D55;
    font-weight: 500;
  }
  .link-url {
    font-size: 10px;
    color: #A0A4AC;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .link-arrow {
    flex-shrink: 0;
    color: #7A7E88;
    transition: transform 0.18s;
  }
  .link-card:hover .link-arrow {
    transform: translate(2px, -2px);
    color: #4A4D55;
  }

  .hint {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #A0A4AC;
  }
  .hint.show { display: flex; }
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;" aria-hidden="true">
  <defs>
    <linearGradient id="bxF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDA776"/>
      <stop offset="100%" stop-color="#B0814C"/>
    </linearGradient>
    <linearGradient id="bxT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C694"/>
      <stop offset="100%" stop-color="#DDA776"/>
    </linearGradient>
    <linearGradient id="bxS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A4753F"/>
      <stop offset="100%" stop-color="#7C5424"/>
    </linearGradient>
    <linearGradient id="tape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DCB0"/>
      <stop offset="100%" stop-color="#E5C896"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E84545"/>
      <stop offset="100%" stop-color="#B81E1E"/>
    </linearGradient>
  </defs>
</svg>

<div class="widget">
  <div class="header">
    <div class="title">Śledzenie<br>paczek</div>
    <svg class="illustration" width="130" height="105" viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="80" cy="120" rx="58" ry="5" fill="#000" opacity="0.09"/>

      <g transform="translate(28, 42)">
        <!-- Box faces -->
        <polygon points="0,18 0,80 62,90 62,28" fill="url(#bxF)" stroke="#6F4720" stroke-width="0.6" stroke-linejoin="round"/>
        <polygon points="0,18 22,3 86,15 62,28" fill="url(#bxT)" stroke="#6F4720" stroke-width="0.6" stroke-linejoin="round"/>
        <polygon points="62,28 86,15 86,76 62,90" fill="url(#bxS)" stroke="#553510" stroke-width="0.6" stroke-linejoin="round"/>

        <!-- Top tape with OTTIMO -->
        <polygon points="8,11 80,22 72,32 0,21" fill="url(#tape)" opacity="0.95"/>
        <text x="40" y="22" font-family="'Outfit', sans-serif" font-size="4.5" fill="#7A5424" font-weight="600" letter-spacing="2" text-anchor="middle" transform="rotate(8.7 40 22)" opacity="0.75">OTTIMO</text>

        <!-- Front tape (vertical, lighter) -->
        <polygon points="24,18 36,20 34,82 22,80" fill="url(#tape)" opacity="0.85"/>

        <!-- Shipping label with barcode (front left) -->
        <rect x="4" y="42" width="16" height="20" fill="#FFFFFF" opacity="0.96" rx="0.6"/>
        <line x1="6" y1="45" x2="18" y2="45.5" stroke="#5A4A35" stroke-width="0.4"/>
        <line x1="6" y1="47" x2="16" y2="47.3" stroke="#5A4A35" stroke-width="0.3"/>
        <g transform="translate(6, 50)" fill="#1A1A1A">
          <rect x="0" y="0" width="0.6" height="10"/>
          <rect x="1.2" y="0" width="1" height="10"/>
          <rect x="2.7" y="0" width="0.5" height="10"/>
          <rect x="3.8" y="0" width="0.9" height="10"/>
          <rect x="5.2" y="0" width="0.6" height="10"/>
          <rect x="6.3" y="0" width="1.3" height="10"/>
          <rect x="8.1" y="0" width="0.5" height="10"/>
          <rect x="9.1" y="0" width="0.8" height="10"/>
          <rect x="10.4" y="0" width="0.7" height="10"/>
          <rect x="11.6" y="0" width="1.1" height="10"/>
        </g>

        <!-- DHL stamp (front right, red) -->
        <g transform="translate(40, 64) rotate(-4)">
          <rect x="0" y="0" width="18" height="9" fill="#FFFFFF" stroke="#D40511" stroke-width="0.5" rx="0.4" opacity="0.95"/>
          <text x="9" y="6.5" font-family="'Outfit', sans-serif" font-size="5" fill="#D40511" font-weight="700" text-anchor="middle">DHL</text>
        </g>

        <!-- InPost stamp (side, yellow) -->
        <g transform="translate(66, 36) skewY(7)">
          <rect x="0" y="0" width="16" height="7" fill="#FFD500" stroke="#000000" stroke-width="0.4" rx="0.3" opacity="0.92"/>
          <text x="8" y="5" font-family="'Outfit', sans-serif" font-size="3.8" fill="#1A1A1A" font-weight="700" text-anchor="middle" letter-spacing="0.2">inpost</text>
        </g>
      </g>

      <!-- Shadow under pin on box -->
      <ellipse cx="70" cy="55" rx="9" ry="2" fill="#000" opacity="0.18"/>

      <!-- Pin GPS -->
      <g transform="translate(58, 14)">
        <path d="M 12 0 C 5 0 0 5 0 12 C 0 16 3 22 12 36 C 21 22 24 16 24 12 C 24 5 19 0 12 0 Z" fill="url(#pin)" stroke="#8E1818" stroke-width="0.4"/>
        <circle cx="12" cy="12" r="4.5" fill="#FFFFFF"/>
        <circle cx="12" cy="12" r="2" fill="#B81E1E"/>
      </g>
    </svg>
  </div>

  <div class="field">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="#8A8E96" stroke-width="1.5"/>
      <line x1="11" y1="11" x2="14" y2="14" stroke="#8A8E96" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input class="input" id="num" type="text" placeholder="Wklej numer przesyłki…" autocomplete="off"/>
  </div>

  <div class="label">Wybierz kuriera</div>

  <div class="grid">
    <div class="courier" data-id="inpost"  style="--accent:#FFD500"><div class="dot"></div><div class="courier-name">InPost</div></div>
    <div class="courier" data-id="dhl"     style="--accent:#FFCC00"><div class="dot"></div><div class="courier-name">DHL</div></div>
    <div class="courier" data-id="dpd"     style="--accent:#DC0032"><div class="dot"></div><div class="courier-name">DPD</div></div>
    <div class="courier" data-id="orlen"   style="--accent:#EE2D24"><div class="dot"></div><div class="courier-name">Orlen</div></div>
    <div class="courier" data-id="allegro" style="--accent:#FF5A00"><div class="dot"></div><div class="courier-name">Allegro</div></div>
  </div>

  <div class="link-area">
    <a class="link-card" id="linkCard" href="#" target="_blank" rel="noopener noreferrer">
      <svg class="link-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="4" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M2 7h14" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="9" cy="11" r="1.2" fill="currentColor"/>
      </svg>
      <div class="link-content">
        <div class="link-title" id="linkTitle">Otwórz śledzenie</div>
        <div class="link-url" id="linkUrl">—</div>
      </div>
      <svg class="link-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M4 10L10 4M10 4H5M10 4V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="hint" id="hint">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="4.5" r="0.7" fill="currentColor"/><path d="M7 7v3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <span id="hintText">Wklej numer i wybierz kuriera</span>
    </div>
  </div>
</div>

<script>
const COURIERS = {
  inpost:  { name: 'InPost',  url: n => `https://inpost.pl/sledzenie-przesylek?number=${encodeURIComponent(n)}` },
  dhl:     { name: 'DHL',     url: n => `https://www.dhl.com/pl-pl/home/tracking/tracking-parcel.html?submit=1&tracking-id=${encodeURIComponent(n)}` },
  dpd:     { name: 'DPD',     url: n => `https://tracktrace.dpd.com.pl/findParcel?p1=${encodeURIComponent(n)}` },
  orlen:   { name: 'Orlen',   url: n => `https://nadaj.orlenpaczka.pl/?numer=${encodeURIComponent(n)}` },
  allegro: { name: 'Allegro', url: n => `https://allegro.pl/moje-allegro/zakupy?searchTerm=${encodeURIComponent(n)}` }
};

const input = document.getElementById('num');
const linkCard = document.getElementById('linkCard');
const linkTitle = document.getElementById('linkTitle');
const linkUrl = document.getElementById('linkUrl');
const hint = document.getElementById('hint');
const hintText = document.getElementById('hintText');

let selectedCourier = null;

document.querySelectorAll('.courier').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.courier').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCourier = btn.dataset.id;
    update();
  });
});

input.addEventListener('input', update);

function update() {
  const num = input.value.trim();
  if (num && selectedCourier) {
    const courier = COURIERS[selectedCourier];
    const url = courier.url(num);
    linkTitle.textContent = `Otwórz w ${courier.name}`;
    linkUrl.textContent = url;
    linkCard.href = url;
    linkCard.classList.add('show');
    hint.classList.remove('show');
  } else {
    linkCard.classList.remove('show');
    if (!num && !selectedCourier) hintText.textContent = 'Wklej numer i wybierz kuriera';
    else if (!num) hintText.textContent = 'Wklej numer przesyłki';
    else hintText.textContent = 'Wybierz kuriera';
    hint.classList.add('show');
  }
}

update();
</script>
</body>
</html>
